<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="utf-8"></meta>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"></meta>
    <meta name="viewport" content="width=device-width, initial-scale=1"></meta>
    <meta name="description" content=""></meta>
    <meta name="author" content=""></meta>

    <!-- Bootstrap core CSSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title th:utext="#{label.pages.home.title}">home</title>
</head>

<body>
<nav class="navbar navbar-default">
  <div class="container-fluid">
    <div class="navbar-header">
        <a class="navbar-brand" th:href="@{/pages/dashboard/handlePortalHome}" th:utext="#{label.pages.home.title}">home</a>
    </div>
      <ul class="nav navbar-nav navbar-right">
        <li><a th:href="@{/logout}" th:utext="#{label.pages.logout}">logout</a> </li>
      </ul>
    </div>
</nav>

    <div class="container">

        <div class="row wrapper">

            <span class="col-sm-8 btn btn-warning" th:if="${authenticatedUser.username} != null">
                <h3 th:utext="${'Welcome, ' + authenticatedUser.firstName +  ' ' + authenticatedUser.lastName}"></h3>
            </span>
            <span class="col-sm-4 btn btn-info" th:if="${authenticatedUser.username} != null">
                <h5 th:utext="${'[Username: ' + authenticatedUser.username + ']'}"></h5>
            </span>

        </div>

        <br/>

        <h1>Resource Dashboard</h1>
        <h4>(FGA Check)</h4>

        <br/>

        <div>
            <table class="table table-striped">
                <caption>
                    [Hint]: To add new Resources, use the [Post] API on:
                    <a class="btn btn-warning" th:href="@{/swagger-ui/index.html#/resource-thing-mgmt-rest-controller/createResourcesThingsList}" target="_blank">Swagger-UI Page</a>
                </caption>
                <thead>
                    <tr>
                        <th scope="col">Id:</th>
                        <th scope="col">Title:</th>
                        <th scope="col">Summary:</th>
                        <th scope="col">Creator:</th>
                        <th scope="col" colspan="2">Actions:</th>
                    </tr>
                </thead>
                <tbody>
                <tr th:each="oneResourceThing : ${resourcesThingsList}">
                    <td th:text="${oneResourceThing.itemProtected.id}">1</td>
                    <td th:text="${oneResourceThing.itemProtected.title}">Some Title</td>
                    <td th:text="${oneResourceThing.itemProtected.summaryContent}">Some Summary</td>
                    <td th:text="${oneResourceThing.itemProtected.creatorUsername}">Username</td>

                    <td th:switch="${oneResourceThing.grantedUiCrudAction}">
                        <span th:case="'edit'">
                            <a class="btn btn-primary" th:href="@{|/pages/assets-mgmt/resources-things/edit/${oneResourceThing.itemProtected.id}|}">Edit</a>
                        </span>
                        <span th:case="'view-only'">
                            <a class="btn btn-info"  th:href="@{|/pages/assets-mgmt/resources-things/view/${oneResourceThing.itemProtected.id}|}">View Only</a>
                        </span>
                        <span th:case="'none'">
                            Any Action granted for you!
                        </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <br /> <br/>
        <a th:href="@{/pages/iam/authn/loggedUsers}" th:utext="#{label.pages.users.message}">View logged in users</a>
        <br />
        <a th:href="@{/pages/iam/authn/loggedUsersFromSessionRegistry}" th:utext="#{label.pages.users.sessionregistry.message}">View logged in users</a>

    </div>


    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <!-- script src="resources/js/bootstrap-3.3.2-dist/bootstrap.min.js"></script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
