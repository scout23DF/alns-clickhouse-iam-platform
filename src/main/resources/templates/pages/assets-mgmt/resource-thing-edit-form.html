<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="utf-8"></meta>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"></meta>
    <meta name="viewport" content="width=device-width, initial-scale=1"></meta>
    <meta name="description" content=""></meta>
    <meta name="author" content=""></meta>

    <!-- Bootstrap core CSSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <title>Resource Thing :: Edit</title>
</head>

<body>
    <div class="container">



        <nav class="navbar navbar-default">
            <div class="container-fluid">
                <div class="navbar-header">
                    <a class="navbar-brand" th:href="@{/pages/dashboard/handlePortalHome}" th:utext="#{label.pages.home.title}">home</a>
                </div>
                <ul class="nav navbar-nav navbar-right">
                    <li><a th:href="@{/logout}" th:utext="#{label.pages.logout}">logout</a> </li>
                </ul>
            </div>
        </nav>

        <div>

            <form th:action="@{|/pages/assets-mgmt/resources-things/update/${targetResourceThing.id}|}" th:object="${targetResourceThing}" method="POST" enctype="UTF-8">

                <div class="form-group row">
                    <span class="col-sm-8 btn btn-warning" th:if="${authenticatedUser.username} != null">
                        <h3>Resource Thing :: Edit</h3>
                    </span>
                        <span class="col-sm-4 btn btn-info" th:if="${authenticatedUser.username} != null">
                        <h5 th:utext="${'[Username: ' + authenticatedUser.username + ']'}"></h5>
                    </span>
                </div>

                <br/>

                <div class="form-group row">
                    <label for="id" class="col-sm-3">Id:</label>
                    <span class="col-sm-7">
                        <span class="btn btn-success" th:utext="*{id}"></span>
                    </span>
                     <span id="idError" class="alert alert-danger col-sm-2" style="display:none"></span>
                </div>
                <div class="form-group row">
                    <label for="createdAt" class="col-sm-3">Created At:</label>
                    <span class="col-sm-7">
                        <span th:utext="*{createdAt + ' | by: ' + creatorUsername}"></span>
                    </span>
                    <span id="createdAtError" class="alert alert-danger col-sm-2" style="display:none"></span>
                </div>
                <div class="form-group row">
                    <label for="updatedAt" class="col-sm-3">Last Update at:</label>
                    <span class="col-sm-7">
                        <span th:utext="*{updatedAt}"></span>
                    </span>
                    <span id="updatedAtError" class="alert alert-danger col-sm-2" style="display:none"></span>
                </div>
                <div class="form-group row">
                    <label for="title" class="col-sm-3">Title:</label>
                    <span class="col-sm-7">
                        <input type="text" th:field="*{title}" id="title" class="form-control" name="title" required="required"/>
                    </span>
                    <span id="titleError" class="alert alert-danger col-sm-2" style="display:none"></span>
                </div>
                <div class="form-group row">
                    <label for="metadata" class="col-sm-3">Metadata:</label>
                    <span class="col-sm-7">
                        <input type="text" th:field="*{metadata}" id="metadata" class="form-control" name="metadata" required="required"/>
                    </span>
                    <span id="metadataError" class="alert alert-danger col-sm-2" style="display:none"></span>
                </div>
                <div class="form-group row">
                    <label for="summaryContent" class="col-sm-3">Summary Content:</label>
                    <span class="col-sm-7">
                        <input type="text" th:field="*{summaryContent}" id="summaryContent" class="form-control" name="summaryContent" required="required"/>
                    </span>
                    <span id="summaryContentError" class="alert alert-danger col-sm-2" style="display:none"></span>
                </div>
                <div class="form-group row">
                    <label for="fullContent" class="col-sm-3">Full Content:</label>
                    <span class="col-sm-7">
                        <input type="text" th:field="*{fullContent}" id="fullContent" class="form-control" name="fullContent" required="required"/>
                    </span>
                    <span id="fullContentError" class="alert alert-danger col-sm-2" style="display:none"></span>
                </div>

                <br/>

                <div class="form-group row">
                    <span class="col-sm-3"></span>
                    <span class="col-sm-9">
                        <button type="submit" class="btn btn-primary" >Save Changes</button>
                    </span>
                </div>

            </form>

            <br/>

            <a class="btn btn-info" th:href="@{/pages/dashboard/handlePortalHome}">Back to List</a>

        </div>

    </div>


    <!-- Bootstrap core JavaScript
    ================================================== -->
    <!-- Placed at the end of the document so the pages load faster -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <!-- script src="resources/js/bootstrap-3.3.2-dist/bootstrap.min.js"></script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
